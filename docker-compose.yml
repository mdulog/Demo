services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: pacevite
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d pacevite"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
